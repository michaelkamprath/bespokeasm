---
name: Release artifacts

'on':
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wheel:
    name: Build wheel for pipx
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read project metadata
        id: meta
        run: python scripts/read_project_metadata.py
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.meta.outputs.version }}
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build wheel
        run: python -m build --wheel
      - name: Upload wheel to release
        if: github.event_name == 'release' && github.event.action == 'published' && github.actor != 'nektos/act' && env.SKIP_RELEASE_UPLOAD != 'true'
        shell: bash
        run: |
          shopt -s nullglob
          files=(dist/*.whl)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No wheel files matched dist/*.whl" >&2
            exit 1
          fi
          gh release upload "${{ github.event.release.tag_name }}" "${files[@]}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pyinstaller-linux:
    name: PyInstaller linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read project metadata
        id: meta
        run: python scripts/read_project_metadata.py
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.meta.outputs.version }}
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller
      - name: Build standalone binary
        shell: bash
        run: |
          python -m PyInstaller --onefile --name bespokeasm \
            --distpath dist --paths src --collect-all bespokeasm \
            --add-data "src/bespokeasm/configgen/sublime/resources:bespokeasm/configgen/sublime/resources" \
            --add-data "src/bespokeasm/configgen/vscode/resources:bespokeasm/configgen/vscode/resources" \
            --exclude-module email --exclude-module http --exclude-module urllib \
            --exclude-module ssl --exclude-module xml --exclude-module ctypes \
            --exclude-module ftplib --exclude-module socket --exclude-module netrc \
            --exclude-module webbrowser --exclude-module plistlib --exclude-module calendar \
            --exclude-module csv --exclude-module fractions \
            --exclude-module statistics --exclude-module argparse --exclude-module uuid \
            --exclude-module pre_commit \
            src/bespokeasm/__main__.py
      - name: Rename artifact with platform
        shell: bash
        run: |
          OS_NAME=$(uname -s)
          case "$OS_NAME" in
            Linux*) PLATFORM=linux ;;
            Darwin*) PLATFORM=macos ;;
            MINGW*|MSYS*|CYGWIN*) PLATFORM=windows ;;
            *) PLATFORM=unknown ;;
          esac
          ARCH=$(uname -m)
          EXT=""
          if [ "$PLATFORM" = "windows" ]; then EXT=".exe"; fi
          SRC="dist/bespokeasm${EXT}"
          DEST="dist/bespokeasm-${APP_VERSION}-${PLATFORM}-${ARCH}${EXT}"
          mv "$SRC" "$DEST"
          echo "ASSET_PATH=$DEST" >> "$GITHUB_ENV"
      - name: Upload binary to release
        if: github.event_name == 'release' && github.event.action == 'published' && github.actor != 'nektos/act' && env.SKIP_RELEASE_UPLOAD != 'true'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "${ASSET_PATH}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pyinstaller-linux-arm:
    name: PyInstaller linux-arm64
    if: github.actor != 'nektos/act'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Read project metadata
        id: meta
        run: python scripts/read_project_metadata.py
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.meta.outputs.version }}
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller
      - name: Build standalone binary
        shell: bash
        run: |
          python -m PyInstaller --onefile --name bespokeasm \
            --distpath dist --paths src --collect-all bespokeasm \
            --add-data "src/bespokeasm/configgen/sublime/resources:bespokeasm/configgen/sublime/resources" \
            --add-data "src/bespokeasm/configgen/vscode/resources:bespokeasm/configgen/vscode/resources" \
            --exclude-module email --exclude-module http --exclude-module urllib \
            --exclude-module ssl --exclude-module xml --exclude-module ctypes \
            --exclude-module ftplib --exclude-module socket --exclude-module netrc \
            --exclude-module webbrowser --exclude-module plistlib --exclude-module calendar \
            --exclude-module csv --exclude-module fractions \
            --exclude-module statistics --exclude-module argparse --exclude-module uuid \
            --exclude-module pre_commit \
            src/bespokeasm/__main__.py
      - name: Rename artifact with platform
        shell: bash
        run: |
          OS_NAME=$(uname -s)
          case "$OS_NAME" in
            Linux*) PLATFORM=linux ;;
            Darwin*) PLATFORM=macos ;;
            MINGW*|MSYS*|CYGWIN*) PLATFORM=windows ;;
            *) PLATFORM=unknown ;;
          esac
          ARCH=$(uname -m)
          EXT=""
          if [ "$PLATFORM" = "windows" ]; then EXT=".exe"; fi
          SRC="dist/bespokeasm${EXT}"
          DEST="dist/bespokeasm-${APP_VERSION}-${PLATFORM}-${ARCH}${EXT}"
          mv "$SRC" "$DEST"
          echo "ASSET_PATH=$DEST" >> "$GITHUB_ENV"
      - name: Upload binary to release
        if: github.event_name == 'release' && github.event.action == 'published' && github.actor != 'nektos/act' && env.SKIP_RELEASE_UPLOAD != 'true'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "${ASSET_PATH}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pyinstaller-other:
    name: PyInstaller ${{ matrix.os }}
    if: github.actor != 'nektos/act'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [macos-latest, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Read project metadata
        id: meta
        run: python scripts/read_project_metadata.py
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.meta.outputs.version }}
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller
      - name: Build standalone binary
        shell: bash
        run: |
          # Windows uses ; as the --add-data separator, Unix uses :
          if [[ "$RUNNER_OS" == "Windows" ]]; then SEP=";"; else SEP=":"; fi
          python -m PyInstaller --onefile --name bespokeasm \
            --distpath dist --paths src --collect-all bespokeasm \
            --add-data "src/bespokeasm/configgen/sublime/resources${SEP}bespokeasm/configgen/sublime/resources" \
            --add-data "src/bespokeasm/configgen/vscode/resources${SEP}bespokeasm/configgen/vscode/resources" \
            --exclude-module email --exclude-module http --exclude-module urllib \
            --exclude-module ssl --exclude-module xml --exclude-module ctypes \
            --exclude-module ftplib --exclude-module socket --exclude-module netrc \
            --exclude-module webbrowser --exclude-module plistlib --exclude-module calendar \
            --exclude-module csv --exclude-module fractions \
            --exclude-module statistics --exclude-module argparse --exclude-module uuid \
            --exclude-module pre_commit \
            src/bespokeasm/__main__.py
      - name: Rename artifact with platform
        shell: bash
        run: |
          OS_NAME=$(uname -s)
          case "$OS_NAME" in
            Linux*) PLATFORM=linux ;;
            Darwin*) PLATFORM=macos ;;
            MINGW*|MSYS*|CYGWIN*) PLATFORM=windows ;;
            *) PLATFORM=unknown ;;
          esac
          ARCH=$(uname -m)
          EXT=""
          if [ "$PLATFORM" = "windows" ]; then EXT=".exe"; fi
          SRC="dist/bespokeasm${EXT}"
          DEST="dist/bespokeasm-${APP_VERSION}-${PLATFORM}-${ARCH}${EXT}"
          mv "$SRC" "$DEST"
          echo "ASSET_PATH=$DEST" >> "$GITHUB_ENV"
      - name: Upload binary to release
        if: github.event_name == 'release' && github.event.action == 'published' && github.actor != 'nektos/act' && env.SKIP_RELEASE_UPLOAD != 'true'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "${ASSET_PATH}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
